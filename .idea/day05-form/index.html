<!DOCTYPE html>
<html lang="微软雅黑">
<head>
    <meta charset="UTF-8">
    <title>day05</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h1>报名表单</h1>
        <form id="form">
            <div class="form-item">
                <label>姓名</label>
                <input type="text" id="name" placeholder="输入姓名">
                <span class="error" id="name_error"></span>
            </div>
            <div class="form-item">
                <label>手机号</label>
                <input type="text" id="phone" placeholder="输入手机号">
                <span class="error" id="phone_error"></span>
            </div>
            <div class="form-item">
                <label>邮箱</label>
                <input type="text" id="email" placeholder="输入邮箱">
                <span class="error" id="email_error"></span>
            </div>
            <button type="submit">提交</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
